general.import = ["~/.config/alacritty/themes/tokyonight/night.toml"]
general.working_directory = "~"

[font]
size = 12.0
offset = { x = 0, y = 0 }
builtin_box_drawing = true

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[window]
decorations = "None"
padding = { x = 0, y = 0 }
dimensions = { columns = 120, lines = 30 }
startup_mode = "Maximized"

[cursor]
style = { shape = "Block", blinking = "Never" }

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true
bindings = [{ mouse = "Right", action = "Paste" }]

[[keyboard.bindings]]
key = "F11"
action = "ToggleFullscreen"

[terminal.shell]
program = "/home/yash/.local/bin/herdr"
