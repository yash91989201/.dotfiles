unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# True color support
set -sg terminal-overrides ",*:RGB"

# Faster and smoother terminal behavior
set -s escape-time 10
set -g repeat-time 1000
set -g focus-events on
set -g extended-keys on
set -g extended-keys-format csi-u

# Maintain sequential numbering
set -g renumber-windows on

# Change prefix
unbind C-b
set -g prefix `
bind ` send-prefix

# Start windows/panes from 1
set -g base-index 1
setw -g pane-base-index 1

# Copy mode / vi behavior
setw -g mode-keys vi
set -g mouse on

# History
set -g history-limit 100000

# Status bar
set -g status-position top
set -g status-left-length 120
set -g status-interval 5

# Better titles
set -g set-titles on
set -g set-titles-string '#S / #W'

# Reduce visual noise
set -g display-time 2000
set -g message-style "fg=#c0caf5,bg=#1a1b26"
set -g message-command-style "fg=#c0caf5,bg=#1a1b26"

# Highlight active pane more clearly
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Allow pane/window activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# Open new windows and panes in current working directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Vim-like pane movement
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Keybindings: split
bind H split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind V split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Resize panes quickly (new QoL bindings)
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5

# Toggle status bar
bind-key S set-option -g status

# Easier window navigation (new QoL bindings)
bind-key Tab last-window
bind-key -r C-h previous-window
bind-key -r C-l next-window

# Better copy-mode selection with vi keys
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind r source-file ~/.config/tmux/tmux.conf \; display-message "TMUX config reloaded"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Tokyo Night theme
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_datetime 0

# Resurrect / Continuum
set -g @resurrect-processes 'btop ssh bun bunx claude lazydocker lazygit npm npx node opencode'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @continuum-boot 'on'

# Save / restore
bind-key C-s run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh'
bind-key C-r run-shell '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh'

# TPM
run '~/.tmux/plugins/tpm/tpm'
